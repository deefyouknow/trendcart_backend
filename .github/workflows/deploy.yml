name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy Backend to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 6864
          script: |
            # เปลี่ยน /path/to/TrendCart เป็น path จริงบน Server
            cd /path/to/TrendCart/backend
            git pull origin main
            
            cd ..
            # Rebuild only the api service
            docker compose build trendcart_api
            docker compose up -d trendcart_api
